name: Deploy PHP para Alwaysdata

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Conectar no servidor e atualizar os arquivos
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CIRCUITO_HOST }}
          username: ${{ secrets.CIRCUITO_USER }}
          port: 22
          password: ${{ secrets.CIRCUITO_SENHA }}
          script_stop: true
          script: |
            cd /home/${{ secrets.CIRCUITO_USER }}/www/
            git pull origin main
  